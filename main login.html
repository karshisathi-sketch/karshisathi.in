<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karshi Sathi | Premium Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            position: relative;
        }

        /* --- Back Button Style --- */
        .back-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .back-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #2e7d32;
            background: #ffffff;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s ease;
        }

        .back-link i { margin-right: 8px; }

        .back-link:hover {
            background: #2e7d32;
            color: #ffffff;
            transform: translateX(-5px);
        }
        
        /* --- Main Layout --- */
        .main-container {
            display: flex;
            background: #ffffff;
            width: 1000px;
            height: 600px;
            max-width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .image-section {
            flex: 1.2;
            background: linear-gradient(rgba(46, 125, 50, 0.8), rgba(27, 94, 32, 0.9)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            text-align: center;
        }

        .logo-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 50%;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .image-section h2 { font-size: 36px; font-weight: 700; margin-bottom: 10px; letter-spacing: 1px; }
        .image-section p { font-size: 16px; opacity: 0.9; font-weight: 300; }

        .login-section { 
            flex: 1; 
            padding: 50px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
        }

        .top-header h1 { color: #2e7d32; font-size: 32px; font-weight: 700; margin-bottom: 5px; }
        .top-header p { color: #777; font-size: 14px; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 18px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; color: #333; font-size: 14px; font-weight: 600; }
        .input-group input { 
            width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; 
            outline: none; transition: 0.3s; font-size: 15px; background: #f9f9f9;
        }
        .input-group input:focus { border-color: #2e7d32; background: #fff; box-shadow: 0 4px 12px rgba(46,125,50,0.1); }

        .login-btn { 
            width: 100%; padding: 14px; background: #2e7d32; border: none; color: white; 
            border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; 
            transition: 0.4s; margin-top: 10px; box-shadow: 0 8px 15px rgba(46,125,50,0.2);
        }
        .login-btn:hover { background: #1b5e20; transform: translateY(-2px); box-shadow: 0 12px 20px rgba(46,125,50,0.3); }

        .register-container {
            text-align: center;
            margin-top: 25px;
            padding: 15px;
            border-top: 1px dashed #ddd;
        }
        .register-container p { font-size: 14px; color: #666; }
        .register-link { color: #2e7d32; text-decoration: none; font-weight: 700; transition: 0.3s; }
        
        .activation-badge { 
            margin-top: 20px; font-size: 13px; color: #155724; background: #d4edda; 
            padding: 12px; border-radius: 10px; border-left: 5px solid #28a745;
            text-align: left;
        }

        @media (max-width: 850px) {
            .image-section { display: none; }
            .main-container { width: 450px; height: auto; }
            .login-section { padding: 40px 30px; }
            .back-nav { top: 10px; left: 10px; }
        }
    </style>
</head>
<body>

<nav class="back-nav">
    <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>
</nav>

<div class="main-container">
    <div class="image-section">
        <div class="logo-box">
            <img src="https://cdn-icons-png.flaticon.com/512/2610/2610284.png" alt="Karshi Logo" style="width: 70px; filter: brightness(0) invert(1);">
        </div>
        <h2>Karshi Sathi</h2>
        <p>Your True Partner in Digital Farming</p>
    </div>

    <div class="login-section">
        <div class="top-header">
            <h1>Welcome Back</h1>
            <p>Please enter your credentials to continue</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Mobile Number / User ID</label>
                <input type="text" id="username" placeholder="Type here..." required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Login Now</button>
        </form>

        <div class="register-container">
            <p>Don't have an account? <a href="register.html" class="register-link">Register Here</a></p>
            
            <div class="activation-badge">
                <strong>Status Notice:</strong><br>
                If you register a new account, your account will be active in <b>2 hours</b>.
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 1. ADMIN DATABASE (Alag List)
    // ==========================================
    const ADMIN_DATABASE = [
        { id: "9953", pass: "01234", name: "Yash Yadav", page: "emp9953.html" }
        // Naye Admin yahan add karein: { id: "admin1", pass: "p1", name: "Name", page: "p.html" }
    ];

    // ==========================================
    // 2. USER DATABASE (Alag List)
    // ==========================================
    const USER_DATABASE = [
        { id: "9399497595", pass: "pss0123", name: "Mukesh Yadav", page: "KSC265354170.html" }
        // Naye Users yahan add karein: { id: "user1", pass: "p1", name: "Name", page: "p.html" }
    ];
    // Login Logic
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const userInput = document.getElementById('username').value.trim();
        const passInput = document.getElementById('password').value;

        // Step 1: Check in Admin Database
        const admin = ADMIN_DATABASE.find(a => a.id === userInput && a.pass === passInput);
        if (admin) {
            alert("Admin Access: Welcome " + admin.name);
            window.location.href = admin.page;
            return;
        }

        // Step 2: Check in User Database
        const user = USER_DATABASE.find(u => u.id === userInput && u.pass === passInput);
        if (user) {
            alert("User Login: Welcome " + user.name);
            window.location.href = user.page;
            return;
        }

        // Step 3: Agar dono mein nahi mila
        alert("Invalid Credentials! Please check your ID and Password.");
    });
</script>
</body>
</html>
